<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Interactiva: Formularios Web</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1/font/bootstrap-icons.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230056b3'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='white'%3E✓%3C/text%3E%3C/svg%3E">
</head>

<body>

    <div class="container">
        <header>
            <h1>Quiz: Formularios</h1>
            <div class="header-stats">
                <span id="timer-display" class="hidden">⏱️ 0s</span>
                <button id="theme-toggle" class="btn-theme">🌙 Dark</button>
            </div>
        </header>

        <div id="start-screen">
            <p style="font-size: 1.3rem; max-width: 800px; margin-bottom: 2rem; line-height: 1.5;">Pon a prueba tus
                conocimientos sobre Formularios Web Semánticos. El tiempo empezará a correr en cuanto presiones el
                botón.</p>
            <button id="start-btn">Comenzar Evaluación</button>

            <div class="records-wrapper">
                <h3>Récords Locales</h3>
                <table id="records-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Puntaje</th>
                            <th>Tiempo</th>
                        </tr>
                    </thead>
                    <tbody id="records-body">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="quiz-screen" class="hidden">
            <div id="question-container">
                <div id="question-counter"
                    style="color: var(--text-muted); font-size: 1.2rem; font-weight: bold; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 2px;">
                </div>
                <div id="question-text" class="question-text">Pregunta...</div>
                <div id="options-container" class="options">
                </div>
                <div id="feedback-container" class="hidden">
                    <p id="feedback-text"></p>
                    <button id="next-btn" class="hidden">Siguiente Pregunta →</button>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden">
            <h2 style="font-size: 3rem; margin-top: 0;">¡Evaluación Completada!</h2>
            <p style="font-size: 1.8rem; margin: 2rem 0;">Tu Puntaje: <span id="final-score"
                    style="font-weight: bold; color: var(--success-color); font-size: 2.5rem;"></span> / 10</p>
            <p style="font-size: 1.5rem;">Tiempo total: <span id="final-time"
                    style="font-weight: bold; font-size: 2rem;"></span> segundos.</p>
            <button id="restart-btn" style="margin-top: 3rem;">Volver al Inicio</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="script.js"></script>

</body>

</html>

```
